# netlify.toml – valid configuration for Vite/React SPA
[build]
  command = "npm run build"
  publish = "dist"
  [build.environment]
  VITE_USE_MOCK_DATA = "true"
  VITE_API_BASE_URL = "/api"

[dev]
  command = "npm run dev"
  port = 5173

# Proxy API cho Netlify: forward /api/* tới API Gateway
[[redirects]]
  from = "/api/*"
  to = "https://ebhguaykmc.execute-api.ap-southeast-1.amazonaws.com/:splat"
  status = 200
  force = true
  headers = {Access-Control-Allow-Origin = "*"}

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# SPA fallback – route all non-file requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200