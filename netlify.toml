# netlify.toml – valid configuration for Vite/React SPA
[build]
  command = "npm run build"
  publish = "dist"
  [build.environment]
  VITE_USE_MOCK_DATA = "false"
  VITE_API_BASE_URL = "https://ebhguaykmc.execute-api.ap-southeast-1.amazonaws.com"

[dev]
  command = "npm run dev"
  port = 5173

# Proxy API during local dev (optional)
[[redirects]]
  from = "/api/*"
  to = "http://localhost:4000/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# SPA fallback – route all non‑file requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200